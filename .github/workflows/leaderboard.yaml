const fs = require('fs').promises;

const org = 'ytumatmuh';

const since = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();

console.log("SINCE:", since);

// repos
const repos = await github.paginate(
  github.rest.repos.listForOrg,
  { org, type: 'all', per_page: 1000 }
);

console.log("Total repos:", repos.length);

const repoCounts = {};
const authorCounts = {};
const repoAuthors = {};

for (const r of repos) {
  if (r.archived) continue;

  const name = r.name;

  let commits = [];
  try {
    commits = await github.paginate(
      github.rest.repos.listCommits,
      {
        owner: org,
        repo: name,
        since,
        per_page: 100,
        sha: r.default_branch // ✅ CRITICAL FIX
      }
    );
  } catch (e) {
    console.log(`❌ skip repo ${name}:`, e.message);
    continue;
  }

  console.log(`Repo ${name}: ${commits.length} commits`);

  if (!commits.length) continue;

  repoCounts[name] = commits.length;
  repoAuthors[name] = {};

  for (const c of commits) {
    const author =
      (c.author && c.author.login) || // ✅ doğru olan
      (c.commit?.author?.email) ||
      "unknown";

    authorCounts[author] = (authorCounts[author] || 0) + 1;
    repoAuthors[name][author] = (repoAuthors[name][author] || 0) + 1;
  }
}

const repoItems = Object.entries(repoCounts)
  .map(([repo, commits]) => ({ repo, commits }))
  .sort((a, b) => b.commits - a.commits);

const authorItems = Object.entries(authorCounts)
  .map(([author, commits]) => ({ author, commits }))
  .sort((a, b) => b.commits - a.commits);

if (!repoItems.length) {
  console.log("⚠️ NO DATA FOUND");
}

// 👉 markdown üretimi
const md = [
  `# Weekly commit leaderboard (${org})`,
  `_Since: ${since}_`,
  "",
  "## Top repos",
  "| Repo | Commits |",
  "| --- | ---: |",
  ...repoItems.slice(0, 10).map(r => `| ${r.repo} | ${r.commits} |`),
  "",
  "## Top authors",
  "| Author | Commits |",
  "| --- | ---: |",
  ...authorItems.slice(0, 10).map(a => `| ${a.author} | ${a.commits} |`)
].join("\n");

await fs.writeFile('leaderboard.md', md);
await fs.writeFile('leaderboard.json', JSON.stringify({
  since,
  repoItems,
  authorItems
}, null, 2));

console.log("✅ Files generated");
